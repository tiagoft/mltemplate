[training]
batch_size = 32
num_epochs = 10
learning_rate = 1e-3
checkpoint_every_n_epochs = 2
log_directory = "logs"
# Uncomment to enable Weights & Biases logging:
# wandb_project = "{{ cookiecutter.project_slug }}_experiments"

# One [[model]] entry → used by `train`.
# Multiple [[model]] entries → used by `sweep` (one run per entry).

[[model]]
type = "mlp"
input_size = 128
hidden_sizes = [256, 128]
output_size = 10
dropout = 0.2

# [[model]]
# type = "mlp"
# input_size = 128
# hidden_sizes = [512, 256, 128]
# output_size = 10
# dropout = 0.3

# [[model]]
# type = "cnn"
# channels = [32, 64]
# output_size = 10
# dropout = 0.2

# One [[dataset]] entry → used by `train`.
# Multiple [[dataset]] entries → used by `sweep` (cross-product with [[model]] entries).

[[dataset]]
name = "small"
type = "template"
size = 500
input_size = 128
num_classes = 10
train_ratio = 0.7
val_ratio = 0.15
test_ratio = 0.15

[[dataset]]
name = "large"
type = "template"
size = 2000
input_size = 128
num_classes = 10
train_ratio = 0.7
val_ratio = 0.15
test_ratio = 0.15
