[training]
batch_size = 16
num_epochs = 3
learning_rate = 2e-5
checkpoint_every_n_epochs = 1
log_directory = "logs"

[[model]]
type = "bert"
bert_model_name = "bert-base-uncased"
num_classes = 2
dropout = 0.1

[[dataset]]
name = "imdb"
type = "bert_imdb"
bert_model_name = "bert-base-uncased"
max_seq_len = 128
